name: C/C++ CI

on:
  pull_request:
  push:
    branches: ["main"]

jobs:
  build:
    name: Build Project
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Build
        run: python3 build.py build
